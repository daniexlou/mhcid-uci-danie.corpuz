<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Basic TODO list for IN4MATX 285">

    <!-- Google Font: Roboto -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- font awesome (https://fontawesome.com) for basic icons; source: https://cdnjs.com/libraries/font-awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg==" crossorigin="anonymous" referrerpolicy="no-referrer" />

    <link rel="stylesheet" href="style.css">
    <link rel="checkmark" href="favicon.ico">
    <title>TODO list</title>

</head>

<body>
    <div id="header">
        <h1>You Got This!</h1>
        <p class="subtitle"> To Do List:</p>
    </div>

    <form>
        <input type="text" placeholder="What's your task?" aria-label="New task input">
        <button class="todo-btn" type="submit"aria-label="Add task">Add it!</button>
    </form>

  <div>
        <ul class="todo-list">
            <!--Part 1: add items for "Create Checklist", "Style Webpage", and "Add Animations"-->
           
            <!-- Item 1: Create Checklist — marked complete -->
        <div class="todo-div completed">
          <li>Create Checklist</li>
          <button class="check-btn" aria-label="Mark incomplete">
            <i class="fas fa-check"></i>
          </button>
          <button class="delete-btn" aria-label="Delete task">
            <i class="fas fa-trash"></i>
          </button>
        </div>

        <!-- Item 2: Proofread portfolio -->
        <div class="todo-div">
          <li>Style the Webpage</li>
          <button class="check-btn" aria-label="Mark complete">
            <i class="fas fa-check"></i>
          </button>
          <button class="delete-btn" aria-label="Delete task">
            <i class="fas fa-trash"></i>
          </button>
        </div>

        <!-- Item 3: Prepare for portfolio preview -->
        <div class="todo-div">
          <li>Add Animations</li>
          <button class="check-btn" aria-label="Mark complete">
            <i class="fas fa-check"></i>
          </button>
          <button class="delete-btn" aria-label="Delete task">
            <i class="fas fa-trash"></i>
          </button>
        </div>

        </ul>
    </div>
    
    <script src="script.js" type="text/javascript"> </script>
</body>
</html>
